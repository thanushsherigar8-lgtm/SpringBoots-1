version: "3.9"
services:
  server:
    build: .
    container_name: springboots
    ports:
      - "8080:8080"
    networks:
      - fullstack-net
    restart: unless-stopped
  client:
    build: ./react/my-app
    container_name: react-frontend
    ports:
      - "3000:3000"
    networks:
      - fullstack-net
    depends_on:
      - server
    restart: unless-stopped
networks:
  fullstack-net:
    driver: bridge
